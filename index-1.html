<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祭 — Matsuri</title>
<style>
  :root{
    --ink:#0a0a12;
    --ink-2:#11111d;
    --pearl:#f4ecd8;
    --gold:#c9a227;
    --gold-bright:#e7c75a;
    --vermilion:#d4332e;
    --jade:#3fa99a;
    --violet:#9d6bff;
    --cyan:#5bd0e8;
    --rose:#e89bb4;
    --glass:rgba(244,236,216,.05);
    --glow: 0 0 30px;
    --serif: "Songti SC","Noto Serif JP","Songti TC",Georgia,"Times New Roman",serif;
    --sans:"PingFang SC","Hiragino Sans GB","Noto Sans JP",system-ui,sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--ink);color:var(--pearl)}
  body{font-family:var(--sans);cursor:none;}

  /* ---------- custom cursor ---------- */
  #cursor{
    position:fixed;top:0;left:0;width:36px;height:36px;border-radius:50%;
    border:1px solid rgba(231,199,90,.6);
    transform:translate(-50%,-50%);pointer-events:none;z-index:9999;
    transition:width .25s,height .25s,border-color .25s,background .25s;
    mix-blend-mode:screen;
  }
  #cursor::after{content:"";position:absolute;inset:50%;width:4px;height:4px;
    background:var(--gold-bright);border-radius:50%;transform:translate(-50%,-50%);
    box-shadow:0 0 12px var(--gold-bright);}
  #cursor.hot{width:60px;height:60px;border-color:var(--vermilion);
    background:radial-gradient(circle,rgba(212,51,46,.12),transparent 70%);}

  /* ---------- layered canvases ---------- */
  canvas{position:fixed;inset:0;display:block}
  #sky{z-index:0}
  #petals{z-index:5;pointer-events:none}

  /* ---------- ambient gradient sky overlay ---------- */
  #atmos{position:fixed;inset:0;z-index:1;pointer-events:none;
    transition:background 6s linear;
    background:radial-gradient(ellipse at 50% 120%, rgba(63,169,154,.10), transparent 60%),
               radial-gradient(ellipse at 50% -20%, rgba(157,107,255,.10), transparent 55%);}

  /* distant misty mountains */
  #mountains{position:fixed;left:0;right:0;bottom:0;height:42vh;z-index:2;pointer-events:none}

  /* ---------- loader ---------- */
  #loader{position:fixed;inset:0;z-index:10000;background:var(--ink);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    transition:opacity 1.4s ease, visibility 1.4s;}
  #loader.gone{opacity:0;visibility:hidden}
  .seal-load{width:120px;height:120px;border:1px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;position:relative;
    animation:spin 8s linear infinite;}
  .seal-load::before{content:"";position:absolute;inset:14px;border:1px solid rgba(201,162,39,.35);border-radius:50%}
  .seal-load span{font-family:var(--serif);font-size:54px;color:var(--gold-bright);
    text-shadow:0 0 24px rgba(231,199,90,.6);animation:spin 8s linear infinite reverse}
  #loader p{margin-top:26px;letter-spacing:.5em;font-size:11px;color:rgba(244,236,216,.5);
    text-transform:uppercase;animation:pulse 2.4s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

  /* ---------- stage ---------- */
  #stage{position:fixed;inset:0;z-index:6;}

  /* central seal portal */
  #core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(46vmin,420px);height:min(46vmin,420px);
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;}
  .ring{position:absolute;border-radius:50%;border:1px solid rgba(201,162,39,.4);
    pointer-events:none}
  .ring.r1{inset:0;animation:spin 60s linear infinite}
  .ring.r2{inset:9%;border-style:dashed;border-color:rgba(63,169,154,.4);animation:spin 42s linear infinite reverse}
  .ring.r3{inset:20%;border-color:rgba(157,107,255,.35);animation:spin 30s linear infinite}
  .glyphs{position:absolute;inset:0;animation:spin 90s linear infinite}
  .glyphs span{position:absolute;left:50%;top:50%;font-family:var(--serif);
    font-size:15px;color:rgba(244,236,216,.55);transform-origin:0 0}
  #coreKanji{font-family:var(--serif);font-size:min(20vmin,160px);
    color:var(--pearl);text-shadow:0 0 40px rgba(231,199,90,.45),0 0 80px rgba(212,51,46,.25);
    animation:breathe 6s ease-in-out infinite;cursor:none;pointer-events:auto}
  @keyframes breathe{0%,100%{transform:scale(1);filter:brightness(1)}
    50%{transform:scale(1.045);filter:brightness(1.2)}}

  /* hanging lanterns */
  .lantern{position:absolute;top:-2vh;width:54px;transform-origin:50% -40px;
    animation:sway var(--sway,6s) ease-in-out infinite;z-index:7}
  .lantern svg{filter:drop-shadow(0 0 18px rgba(212,51,46,.55))}
  @keyframes sway{0%,100%{transform:rotate(var(--a,4deg))}50%{transform:rotate(calc(var(--a,4deg) * -1))}}

  /* ---------- constellation nodes ---------- */
  .node{position:absolute;width:120px;height:120px;transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    pointer-events:auto;cursor:none;z-index:8;}
  .node .star{width:14px;height:14px;background:var(--gold-bright);border-radius:50%;
    box-shadow:0 0 16px var(--gold-bright),0 0 40px rgba(231,199,90,.5);
    transition:transform .4s cubic-bezier(.2,.9,.2,1),box-shadow .4s;position:relative}
  .node .star::before{content:"";position:absolute;inset:-10px;border:1px solid rgba(231,199,90,.4);
    border-radius:50%;transition:transform .5s,opacity .5s;opacity:.6}
  .node .label{margin-top:18px;font-family:var(--serif);font-size:14px;letter-spacing:.18em;
    color:rgba(244,236,216,.0);transform:translateY(6px);transition:.45s;white-space:nowrap;text-align:center}
  .node .sub{font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:rgba(201,162,39,.0);
    margin-top:4px;transition:.5s;transform:translateY(8px)}
  .node:hover .star{transform:scale(1.5);box-shadow:0 0 26px #fff,0 0 60px var(--gold-bright)}
  .node:hover .star::before{transform:scale(1.8);opacity:0}
  .node:hover .label{color:var(--pearl);transform:translateY(0)}
  .node:hover .sub{color:var(--gold);transform:translateY(0)}

  /* faint links drawn via svg */
  #links{position:fixed;inset:0;z-index:6;pointer-events:none}
  #links line{stroke:rgba(201,162,39,.14);stroke-width:1;stroke-dasharray:3 7}

  /* ---------- scroll / hint ---------- */
  #brand{position:fixed;top:30px;left:36px;z-index:20;pointer-events:none}
  #brand .jp{font-family:var(--serif);font-size:26px;color:var(--pearl);letter-spacing:.12em}
  #brand .en{font-size:9px;letter-spacing:.5em;color:rgba(201,162,39,.7);text-transform:uppercase;margin-top:4px}

  #clock{position:fixed;top:32px;right:36px;z-index:20;text-align:right;pointer-events:none;
    font-size:10px;letter-spacing:.3em;color:rgba(244,236,216,.45);text-transform:uppercase}
  #clock b{display:block;font-family:var(--serif);font-size:16px;color:var(--jade);letter-spacing:.1em;margin-bottom:3px;font-weight:400}

  #hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:20;
    font-size:10px;letter-spacing:.4em;color:rgba(244,236,216,.4);text-transform:uppercase;
    pointer-events:none;animation:pulse 3s ease-in-out infinite;text-align:center}

  /* sound toggle (a windchime) */
  #sound{position:fixed;bottom:28px;right:36px;z-index:30;width:44px;height:44px;
    border:1px solid rgba(201,162,39,.4);border-radius:50%;background:var(--glass);
    display:flex;align-items:center;justify-content:center;cursor:none;backdrop-filter:blur(4px);
    transition:.4s}
  #sound:hover{border-color:var(--gold-bright);background:rgba(201,162,39,.12)}
  #sound svg{width:20px;height:20px}
  #sound .wave{opacity:0;transition:.4s}
  #sound.on .wave{opacity:1}

  /* ---------- the idol / character ---------- */
  #idol{position:fixed;right:4vw;bottom:0;height:86vh;z-index:4;pointer-events:none;
    filter:drop-shadow(0 0 50px rgba(157,107,255,.25));}
  @media(max-width:820px){#idol{opacity:.32;right:-8vw;height:70vh}}

  /* ---------- panel (revealed scroll) ---------- */
  #veil{position:fixed;inset:0;z-index:40;background:rgba(5,5,10,.0);
    backdrop-filter:blur(0px);pointer-events:none;transition:background .8s,backdrop-filter .8s;}
  #veil.show{background:rgba(5,5,10,.55);backdrop-filter:blur(10px);pointer-events:auto}

  #panel{position:fixed;left:50%;top:50%;z-index:41;
    width:min(620px,90vw);transform:translate(-50%,-46%) scale(.92);opacity:0;
    pointer-events:none;transition:transform .9s cubic-bezier(.16,1,.3,1),opacity .7s;}
  #panel.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
  .scroll{position:relative;background:
      linear-gradient(180deg,rgba(20,18,28,.96),rgba(12,11,18,.98));
    border:1px solid rgba(201,162,39,.28);border-radius:6px;overflow:hidden;
    box-shadow:0 40px 120px rgba(0,0,0,.7), inset 0 0 60px rgba(201,162,39,.04)}
  .scroll::before,.scroll::after{content:"";position:absolute;left:0;right:0;height:18px;
    background:linear-gradient(90deg,var(--vermilion),#7a1f1b);}
  .scroll::before{top:0}.scroll::after{bottom:0}
  .scroll-in{padding:54px 46px}
  .scroll-eyebrow{display:flex;align-items:center;gap:12px;font-size:9px;letter-spacing:.4em;
    text-transform:uppercase;color:var(--gold);margin-bottom:18px}
  .scroll-eyebrow::before{content:"";width:30px;height:1px;background:var(--gold)}
  #panelKanji{font-family:var(--serif);font-size:64px;color:var(--pearl);line-height:1;
    margin-bottom:8px;text-shadow:0 0 30px rgba(231,199,90,.3)}
  #panelTitle{font-family:var(--serif);font-size:24px;letter-spacing:.06em;margin-bottom:22px;color:var(--pearl)}
  #panelBody{font-size:14.5px;line-height:1.95;color:rgba(244,236,216,.78);max-width:46ch}
  #panelBody .ink-line{opacity:0;transform:translateY(8px);animation:rise .8s forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .close{position:absolute;top:18px;right:20px;width:34px;height:34px;border-radius:50%;
    border:1px solid rgba(244,236,216,.2);display:flex;align-items:center;justify-content:center;
    cursor:none;color:rgba(244,236,216,.6);font-size:18px;font-family:var(--serif);transition:.3s;z-index:2}
  .close:hover{border-color:var(--vermilion);color:var(--vermilion);transform:rotate(90deg)}

  /* easter egg fortune */
  #fortune{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.8);
    z-index:60;opacity:0;pointer-events:none;transition:.9s;text-align:center}
  #fortune.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #fortune .jp{font-family:var(--serif);font-size:80px;color:var(--gold-bright);
    text-shadow:0 0 50px rgba(231,199,90,.7)}
  #fortune .txt{margin-top:18px;font-family:var(--serif);font-size:18px;letter-spacing:.1em;color:var(--pearl)}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s!important;animation-iteration-count:1!important}
  }
  @media(max-width:560px){
    .node .label{font-size:12px}#brand{left:20px;top:22px}#clock{right:20px;top:24px}
    .scroll-in{padding:40px 28px}#panelKanji{font-size:48px}
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="seal-load"><span>祭</span></div>
  <p>despertando o santuário</p>
</div>

<!-- BACKGROUND LAYERS -->
<canvas id="sky"></canvas>
<div id="atmos"></div>
<svg id="mountains" viewBox="0 0 1440 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1830" stop-opacity=".0"/>
      <stop offset="1" stop-color="#15131f" stop-opacity=".9"/>
    </linearGradient>
    <linearGradient id="mg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23203a" stop-opacity=".0"/>
      <stop offset="1" stop-color="#1c1830" stop-opacity=".85"/>
    </linearGradient>
  </defs>
  <path fill="url(#mg1)" d="M0,260 C220,150 360,300 560,210 C760,120 900,280 1120,200 C1300,140 1380,250 1440,220 L1440,400 L0,400 Z"/>
  <path fill="url(#mg2)" d="M0,320 C200,250 380,330 600,280 C820,230 980,330 1200,270 C1340,235 1400,300 1440,290 L1440,400 L0,400 Z" opacity=".7"/>
</svg>

<!-- LINKS between nodes -->
<svg id="links"></svg>

<!-- PETALS + particles -->
<canvas id="petals"></canvas>

<!-- IDOL CHARACTER (original SVG) -->
<svg id="idol" viewBox="0 0 300 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1840"/><stop offset=".5" stop-color="#4a2d6e"/>
      <stop offset="1" stop-color="#9d6bff"/>
    </linearGradient>
    <linearGradient id="robe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4332e"/><stop offset=".6" stop-color="#7a1f3a"/>
      <stop offset="1" stop-color="#3a1330"/>
    </linearGradient>
    <linearGradient id="sash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7c75a"/><stop offset="1" stop-color="#9a7a1e"/>
    </linearGradient>
    <radialGradient id="halo"><stop offset="0" stop-color="rgba(231,199,90,.5)"/>
      <stop offset="1" stop-color="rgba(231,199,90,0)"/></radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="1.2"/></filter>
  </defs>

  <!-- halo -->
  <circle cx="150" cy="120" r="120" fill="url(#halo)"/>

  <!-- back hair flowing -->
  <g id="hairBack">
    <path fill="url(#hair)" opacity=".9" d="M150 60 C95 70 78 150 86 280 C92 380 70 470 100 560 C120 520 135 470 140 420 C150 470 160 540 175 575 C200 480 188 380 198 280 C212 150 205 72 150 60 Z"/>
  </g>

  <!-- robe / kimono body -->
  <g id="robe">
    <path fill="url(#robe)" d="M150 250 C110 255 92 290 86 360 C78 460 70 520 64 580 L236 580 C230 520 222 460 214 360 C208 290 190 255 150 250 Z"/>
    <!-- collar -->
    <path fill="#f4ecd8" d="M150 250 L120 300 L150 320 L180 300 Z"/>
    <path fill="none" stroke="#3a1330" stroke-width="2" d="M150 252 L150 320"/>
    <!-- sash -->
    <rect x="78" y="360" width="144" height="34" rx="4" fill="url(#sash)"/>
    <rect x="140" y="360" width="20" height="120" rx="6" fill="url(#sash)" opacity=".85"/>
    <!-- sleeve patterns -->
    <circle cx="110" cy="420" r="10" fill="none" stroke="rgba(231,199,90,.5)" stroke-width="1.5"/>
    <circle cx="190" cy="440" r="8" fill="none" stroke="rgba(231,199,90,.5)" stroke-width="1.5"/>
  </g>

  <!-- neck -->
  <rect x="138" y="205" width="24" height="48" rx="10" fill="#f0d9c2"/>

  <!-- head -->
  <g id="head">
    <ellipse cx="150" cy="160" rx="52" ry="58" fill="#f6e2cf"/>
    <!-- front hair -->
    <path fill="url(#hair)" d="M150 100 C112 100 96 130 98 168 C108 150 118 142 130 140 C124 158 122 172 126 186 C140 150 160 150 174 186 C178 172 176 158 170 140 C182 142 192 150 202 168 C204 130 188 100 150 100 Z"/>
    <!-- eyes -->
    <g id="eyes">
      <ellipse class="eye" cx="131" cy="166" rx="7" ry="9" fill="#2a1840"/>
      <ellipse class="eye" cx="169" cy="166" rx="7" ry="9" fill="#2a1840"/>
      <circle cx="133" cy="163" r="2.2" fill="#fff"/><circle cx="171" cy="163" r="2.2" fill="#fff"/>
    </g>
    <!-- blush + lips (wine) -->
    <ellipse cx="120" cy="182" rx="9" ry="5" fill="rgba(212,51,46,.18)"/>
    <ellipse cx="180" cy="182" rx="9" ry="5" fill="rgba(212,51,46,.18)"/>
    <path d="M142 192 Q150 198 158 192" stroke="#8a1f3a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- forehead ornament -->
    <path d="M150 120 l6 8 -6 6 -6 -6 z" fill="var(--gold-bright)" filter="url(#soft)"/>
  </g>

  <!-- floating petals around idol drawn on canvas instead -->
</svg>

<!-- HANGING LANTERNS -->
<div class="lantern" style="left:16%;--sway:6s;--a:5deg">
  <svg viewBox="0 0 60 90"><line x1="30" y1="0" x2="30" y2="14" stroke="#c9a227"/>
    <ellipse cx="30" cy="48" rx="24" ry="32" fill="#d4332e"/>
    <rect x="6" y="44" width="48" height="9" fill="rgba(255,220,180,.6)"/>
    <rect x="22" y="80" width="16" height="8" fill="#c9a227"/></svg>
</div>
<div class="lantern" style="left:84%;--sway:7.5s;--a:6deg">
  <svg viewBox="0 0 60 90"><line x1="30" y1="0" x2="30" y2="14" stroke="#c9a227"/>
    <ellipse cx="30" cy="48" rx="24" ry="32" fill="#7a1f3a"/>
    <rect x="6" y="44" width="48" height="9" fill="rgba(255,210,150,.6)"/>
    <rect x="22" y="80" width="16" height="8" fill="#c9a227"/></svg>
</div>

<!-- STAGE -->
<div id="stage">
  <div id="core">
    <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
    <div class="glyphs" id="glyphs"></div>
    <div id="coreKanji">祭</div>
  </div>
</div>

<!-- HUD -->
<div id="brand"><div class="jp">祭 マツリ</div><div class="en">Festival Vivo</div></div>
<div id="clock"><b id="phase">—</b><span id="time"></span></div>
<div id="hint">mova-se • toque uma estrela • acorde o santuário</div>

<button id="sound" aria-label="Som ambiente">
  <svg viewBox="0 0 24 24" fill="none" stroke="#c9a227" stroke-width="1.5">
    <path d="M4 9v6h4l5 4V5L8 9H4z"/>
    <path class="wave" d="M16 8c1.5 1.5 1.5 6.5 0 8" stroke-linecap="round"/>
    <path class="wave" d="M18.5 5.5c3 3 3 10 0 13" stroke-linecap="round"/>
  </svg>
</button>

<!-- VEIL + PANEL -->
<div id="veil"></div>
<div id="panel">
  <div class="scroll">
    <div class="close" id="closeP">×</div>
    <div class="scroll-in">
      <div class="scroll-eyebrow" id="panelEye">portal</div>
      <div id="panelKanji">道</div>
      <div id="panelTitle">—</div>
      <div id="panelBody"></div>
    </div>
  </div>
</div>

<!-- EASTER EGG -->
<div id="fortune"><div class="jp">運</div><div class="txt"></div></div>

<!-- CURSOR -->
<div id="cursor"></div>

<script>
"use strict";
const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
const TAU = Math.PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);
const lerp=(a,b,t)=>a+(b-a)*t;

/* ===================== CURSOR ===================== */
const cursor=document.getElementById("cursor");
let mx=innerWidth/2, my=innerHeight/2, cx=mx, cy=my;
addEventListener("pointermove",e=>{mx=e.clientX;my=e.clientY;},{passive:true});
function cursorLoop(){cx=lerp(cx,mx,.18);cy=lerp(cy,my,.18);
  cursor.style.transform=`translate(${cx}px,${cy}px) translate(-50%,-50%)`;
  requestAnimationFrame(cursorLoop);}
cursorLoop();
document.querySelectorAll("a,button,.node,#coreKanji,.close").forEach(el=>{
  el.addEventListener("pointerenter",()=>cursor.classList.add("hot"));
  el.addEventListener("pointerleave",()=>cursor.classList.remove("hot"));
});

/* ===================== SKY: starfield + koi + fireflies ===================== */
const sky=document.getElementById("sky"),sc=sky.getContext("2d");
let W,H,DPR;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  [sky,petals].forEach(c=>{c.width=W*DPR;c.height=H*DPR;c.style.width=W+"px";c.style.height=H+"px";
    c.getContext("2d").setTransform(DPR,0,0,DPR,0,0);});
  layoutNodes();
}
const stars=[],fireflies=[];
for(let i=0;i<160;i++)stars.push({x:Math.random(),y:Math.random()*.8,r:rand(.4,1.6),tw:rand(0,TAU),sp:rand(.6,2)});
for(let i=0;i<26;i++)fireflies.push({x:rand(0,1),y:rand(.4,1),vx:rand(-.0003,.0003),vy:rand(-.0003,.0003),ph:rand(0,TAU),r:rand(1.2,2.6)});

/* ===================== PETALS (cursor-reactive physics) ===================== */
const petals=document.getElementById("petals"),pc=petals.getContext("2d");
const PETALS=[],GOLD=[];
function spawnPetal(y0){
  PETALS.push({x:rand(0,W),y:y0??rand(-H,0),z:rand(.4,1.2),
    vy:rand(.3,.9),vx:rand(-.2,.2),rot:rand(0,TAU),vr:rand(-.02,.02),
    sz:rand(7,16),hue:Math.random()<.5?"rose":"gold"});
}
for(let i=0;i<46;i++)spawnPetal();
for(let i=0;i<60;i++)GOLD.push({x:rand(0,W),y:rand(0,H),r:rand(.4,1.8),ph:rand(0,TAU),sp:rand(.4,1.4)});

function drawPetal(p){
  pc.save();pc.translate(p.x,p.y);pc.rotate(p.rot);pc.scale(p.z,p.z);
  const g=pc.createLinearGradient(0,-p.sz,0,p.sz);
  if(p.hue==="rose"){g.addColorStop(0,"rgba(232,155,180,.9)");g.addColorStop(1,"rgba(212,51,46,.5)");}
  else{g.addColorStop(0,"rgba(231,199,90,.95)");g.addColorStop(1,"rgba(201,162,39,.5)");}
  pc.fillStyle=g;
  pc.beginPath();
  pc.moveTo(0,-p.sz);
  pc.bezierCurveTo(p.sz*.7,-p.sz*.5,p.sz*.5,p.sz*.6,0,p.sz);
  pc.bezierCurveTo(-p.sz*.5,p.sz*.6,-p.sz*.7,-p.sz*.5,0,-p.sz);
  pc.fill();
  pc.strokeStyle="rgba(255,255,255,.12)";pc.lineWidth=.6;pc.stroke();
  pc.restore();
}

/* ===================== MAIN RENDER ===================== */
let t=0;
function render(){
  t+=1;
  // ----- sky -----
  sc.clearRect(0,0,W,H);
  // ambient vertical wash
  const sg=sc.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,phase.sky0);sg.addColorStop(1,phase.sky1);
  sc.fillStyle=sg;sc.fillRect(0,0,W,H);
  // stars
  for(const s of stars){
    const a=.4+.6*Math.abs(Math.sin(t*.01*s.sp+s.tw));
    sc.globalAlpha=a*phase.starA;sc.fillStyle="#fff";
    sc.beginPath();sc.arc(s.x*W,s.y*H,s.r,0,TAU);sc.fill();
  }
  sc.globalAlpha=1;
  // moon
  sc.save();
  const moonX=W*.78,moonY=H*.22;
  const mg=sc.createRadialGradient(moonX,moonY,4,moonX,moonY,90);
  mg.addColorStop(0,"rgba(244,236,216,.95)");mg.addColorStop(.5,"rgba(231,199,90,.25)");mg.addColorStop(1,"rgba(231,199,90,0)");
  sc.fillStyle=mg;sc.beginPath();sc.arc(moonX,moonY,90,0,TAU);sc.fill();
  sc.restore();
  // fireflies
  for(const f of fireflies){
    f.x+=f.vx;f.y+=f.vy;f.ph+=.03;
    if(f.x<0||f.x>1)f.vx*=-1;if(f.y<.4||f.y>1)f.vy*=-1;
    const a=(.4+.6*Math.sin(f.ph))*phase.fireA;
    sc.globalAlpha=Math.max(0,a);
    const fg=sc.createRadialGradient(f.x*W,f.y*H,0,f.x*W,f.y*H,10);
    fg.addColorStop(0,"rgba(231,199,90,.9)");fg.addColorStop(1,"rgba(231,199,90,0)");
    sc.fillStyle=fg;sc.beginPath();sc.arc(f.x*W,f.y*H,10,0,TAU);sc.fill();
  }
  sc.globalAlpha=1;

  // ----- petals layer -----
  pc.clearRect(0,0,W,H);
  // golden dust drifting toward cursor
  for(const d of GOLD){
    const dx=mx-d.x,dy=my-d.y,dist=Math.hypot(dx,dy);
    if(dist<160){d.x+=dx/dist*.4;d.y+=dy/dist*.4;}
    d.ph+=.02;
    pc.globalAlpha=.3+.4*Math.sin(d.ph+d.sp);
    pc.fillStyle="#e7c75a";
    pc.beginPath();pc.arc(d.x,d.y,d.r,0,TAU);pc.fill();
  }
  pc.globalAlpha=1;
  // petals with cursor avoidance
  for(const p of PETALS){
    p.y+=p.vy*p.z*(reduce?0:1);
    p.x+=p.vx + Math.sin((p.y+t)*.01)*.4;
    p.rot+=p.vr;
    // avoid cursor
    const dx=p.x-mx,dy=p.y-my,d2=dx*dx+dy*dy;
    if(d2<14000){const d=Math.sqrt(d2)||1;p.x+=dx/d*2.2;p.y+=dy/d*2.2;}
    if(p.y>H+20){p.y=-20;p.x=rand(0,W);}
    if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;
    drawPetal(p);
  }

  requestAnimationFrame(render);
}

/* ===================== AUDIO (WebAudio, generated) ===================== */
let actx,master,playing=false,nodes=[];
const soundBtn=document.getElementById("sound");
function startAudio(){
  actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain();master.gain.value=0;master.connect(actx.destination);
  // drone pad (two detuned oscillators through lowpass)
  const lp=actx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=520;lp.connect(master);
  [196,261.63,329.63].forEach((f,i)=>{
    const o=actx.createOscillator();o.type="sine";o.frequency.value=f;
    const g=actx.createGain();g.gain.value=.12;
    const lfo=actx.createOscillator();lfo.frequency.value=.07+i*.02;
    const lg=actx.createGain();lg.gain.value=.05;lfo.connect(lg);lg.connect(g.gain);
    o.connect(g);g.connect(lp);o.start();lfo.start();nodes.push(o,lfo);
  });
  // wind: filtered noise
  const buf=actx.createBuffer(1,actx.sampleRate*2,actx.sampleRate);
  const dat=buf.getChannelData(0);for(let i=0;i<dat.length;i++)dat[i]=Math.random()*2-1;
  const noise=actx.createBufferSource();noise.buffer=buf;noise.loop=true;
  const nf=actx.createBiquadFilter();nf.type="bandpass";nf.frequency.value=600;nf.Q.value=.6;
  const ng=actx.createGain();ng.gain.value=.04;
  noise.connect(nf);nf.connect(ng);ng.connect(master);noise.start();nodes.push(noise);
  // chime every ~9s
  setInterval(()=>{if(!playing)return;chime();},9000);
}
function chime(){
  const notes=[523.25,659.25,783.99,1046.5];
  const f=notes[Math.floor(Math.random()*notes.length)];
  const o=actx.createOscillator();o.type="triangle";o.frequency.value=f;
  const g=actx.createGain();g.gain.setValueAtTime(0,actx.currentTime);
  g.gain.linearRampToValueAtTime(.18,actx.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+3);
  o.connect(g);g.connect(master);o.start();o.stop(actx.currentTime+3);
}
soundBtn.addEventListener("click",()=>{
  if(!actx)startAudio();
  playing=!playing;soundBtn.classList.toggle("on",playing);
  master.gain.linearRampToValueAtTime(playing?.6:0, actx.currentTime+1.2);
  if(playing&&actx.state==="suspended")actx.resume();
});
